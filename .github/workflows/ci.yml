name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping dependency installation"
          fi

      - name: Validate HTML structure
        run: |
          # Check if index.html exists and has basic structure
          if [ ! -f index.html ]; then
            echo "Error: index.html not found"
            exit 1
          fi
          echo "✅ HTML file exists"

          # Basic HTML validation
          if ! grep -q "<!DOCTYPE html>" index.html; then
            echo "Error: HTML5 doctype not found"
            exit 1
          fi
          echo "✅ HTML5 doctype found"

          # Check for required game elements
          if ! grep -q 'id="score"' index.html; then
            echo "Error: Score element not found"
            exit 1
          fi
          echo "✅ Score element found"

          if ! grep -q 'id="circle"' index.html; then
            echo "Error: Circle element not found"
            exit 1
          fi
          echo "✅ Circle element found"

          if ! grep -q 'id="gameOverModal"' index.html; then
            echo "Error: Game Over modal not found"
            exit 1
          fi
          echo "✅ Game Over modal found"

          # Check two-player version if it exists
          if [ -f index2.html ]; then
            echo "🎮 Checking two-player version..."

            if ! grep -q 'id="score1"' index2.html; then
              echo "Error: Player 1 score element not found in two-player version"
              exit 1
            fi
            echo "✅ Player 1 score element found"

            if ! grep -q 'id="score2"' index2.html; then
              echo "Error: Player 2 score element not found in two-player version"
              exit 1
            fi
            echo "✅ Player 2 score element found"

            if ! grep -q 'id="circle1"' index2.html; then
              echo "Error: Player 1 circle not found in two-player version"
              exit 1
            fi
            echo "✅ Player 1 circle found"

            if ! grep -q 'id="circle2"' index2.html; then
              echo "Error: Player 2 circle not found in two-player version"
              exit 1
            fi
            echo "✅ Player 2 circle found"
          fi

      - name: Validate JavaScript syntax
        run: |
          # Extract and validate JavaScript from HTML
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');

            // Extract script content
            const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);
            if (!scriptMatch) {
              console.error('No script tag found');
              process.exit(1);
            }

            const jsCode = scriptMatch[1];

            // Basic syntax validation by trying to parse
            try {
              new Function(jsCode);
              console.log('✅ JavaScript syntax is valid');
            } catch (error) {
              console.error('❌ JavaScript syntax error:', error.message);
              process.exit(1);
            }

            // Check for required functions
            const requiredFunctions = ['updateScore', 'startTimer', 'endGame', 'restartGame'];
            for (const func of requiredFunctions) {
              if (!jsCode.includes('function ' + func)) {
                console.error(\`❌ Required function '\${func}' not found\`);
                process.exit(1);
              }
            }
            console.log('✅ All required functions found');
          "

      - name: Check line count constraint
        run: |
          line_count=$(wc -l < index.html)
          echo "Single player version line count: $line_count"
          if [ $line_count -gt 200 ]; then
            echo "❌ Error: Single player file exceeds 200 line limit (current: $line_count)"
            exit 1
          fi
          echo "✅ Single player line count constraint satisfied ($line_count/200)"

          # Check two-player version if it exists
          if [ -f index2.html ]; then
            line_count2=$(wc -l < index2.html)
            echo "Two player version line count: $line_count2"
            if [ $line_count2 -gt 300 ]; then
              echo "❌ Error: Two player file exceeds 300 line limit (current: $line_count2)"
              exit 1
            fi
            echo "✅ Two player line count constraint satisfied ($line_count2/300)"
          fi

      - name: Validate CSS structure
        run: |
          # Check for required CSS classes
          required_classes=(".score" ".circle" ".modal" ".modal-content" ".restart-btn")

          for class in "${required_classes[@]}"; do
            if ! grep -q "$class" index.html; then
              echo "❌ Error: Required CSS class $class not found"
              exit 1
            fi
          done
          echo "✅ All required CSS classes found"

          # Check for blue circle background
          if ! grep -q "#4169E1\|#4169e1\|royalblue" index.html; then
            echo "❌ Error: Blue circle background color not found"
            exit 1
          fi
          echo "✅ Blue circle background color found"

          # Check two-player version colors if it exists
          if [ -f index2.html ]; then
            if ! grep -q "#4169E1\|#4169e1" index2.html; then
              echo "❌ Error: Blue player color not found in two-player version"
              exit 1
            fi
            echo "✅ Blue player color found in two-player version"

            if ! grep -q "#DC143C\|#dc143c" index2.html; then
              echo "❌ Error: Red player color not found in two-player version"
              exit 1
            fi
            echo "✅ Red player color found in two-player version"
          fi

      - name: Test game functionality (basic checks)
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');

            // Check timer duration (10 seconds = 10000ms)
            if (!html.includes('10000')) {
              console.error('❌ 10-second timer not found');
              process.exit(1);
            }
            console.log('✅ 10-second timer found');

            // Check for Game Over text
            if (!html.includes('Game Over')) {
              console.error('❌ Game Over text not found');
              process.exit(1);
            }
            console.log('✅ Game Over text found');

            // Check for Restart button
            if (!html.includes('Restart')) {
              console.error('❌ Restart button not found');
              process.exit(1);
            }
            console.log('✅ Restart button found');

            // Check two-player version if it exists
            if (require('fs').existsSync('index2.html')) {
              const html2 = require('fs').readFileSync('index2.html', 'utf8');

              // Check for Player 1 Wins message
              if (!html2.includes('Player 1 Wins!')) {
                console.error('❌ Player 1 Wins message not found in two-player version');
                process.exit(1);
              }
              console.log('✅ Player 1 Wins message found');

              // Check for Player 2 Wins message
              if (!html2.includes('Player 2 Wins!')) {
                console.error('❌ Player 2 Wins message not found in two-player version');
                process.exit(1);
              }
              console.log('✅ Player 2 Wins message found');

              // Check for Draw message
              if (!html2.includes('Draw!')) {
                console.error('❌ Draw message not found in two-player version');
                process.exit(1);
              }
              console.log('✅ Draw message found');

              // Check for Play Again button
              if (!html2.includes('Play Again')) {
                console.error('❌ Play Again button not found in two-player version');
                process.exit(1);
              }
              console.log('✅ Play Again button found');
            }
          "

      - name: Generate test report
        run: |
          echo "## 🎮 Simple Tap Game CI Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "- HTML structure validation" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript syntax validation" >> $GITHUB_STEP_SUMMARY
          echo "- CSS structure validation" >> $GITHUB_STEP_SUMMARY
          echo "- Game functionality checks" >> $GITHUB_STEP_SUMMARY
          echo "- Line count constraint ($(wc -l < index.html)/200 lines)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Project Stats" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Single player lines: $(wc -l < index.html)" >> $GITHUB_STEP_SUMMARY
          echo "- Single player file size: $(du -h index.html | cut -f1)B" >> $GITHUB_STEP_SUMMARY
          if [ -f index2.html ]; then
            echo "- Two player lines: $(wc -l < index2.html)" >> $GITHUB_STEP_SUMMARY
            echo "- Two player file size: $(du -h index2.html | cut -f1)B" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🚀 Ready for deployment!"

  deploy-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment readiness
        run: |
          echo "🔍 Checking deployment readiness..."

          # Check if all required files exist
          required_files=("index.html" "package.json" "README.md")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Required file $file is missing"
              exit 1
            fi
          done
          echo "✅ All required files present"

          # Check optional two-player files
          if [ -f index2.html ]; then
            echo "✅ Two-player version found"
            if [ -f README2.md ]; then
              echo "✅ Two-player documentation found"
            fi
            if [ -f requirements/tap_game2.yaml ]; then
              echo "✅ Two-player requirements found"
            fi
            if [ -f test_spec/tap_game_test2.yaml ]; then
              echo "✅ Two-player test specs found"
            fi
          fi

          # Verify HTML can be served statically
          if grep -q "<!DOCTYPE html>" index.html && grep -q "</html>" index.html; then
            echo "✅ HTML is well-formed for static serving"
          else
            echo "❌ HTML structure issues detected"
            exit 1
          fi

          echo "🎉 Project is ready for deployment!"
