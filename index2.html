<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tap Game - Two Players</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }

        .player-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .vs-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 30px;
        }

        .player-name {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .score {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            user-select: none;
        }

        .circle:hover {
            transform: scale(1.05);
        }

        .circle:active {
            transform: scale(0.95);
        }

        .circle.player1 {
            background-color: #4169E1;
        }

        .circle.player1:hover {
            background-color: #3155d9;
        }

        .circle.player2 {
            background-color: #DC143C;
        }

        .circle.player2:hover {
            background-color: #B22222;
        }

        .vs-text {
            font-size: 2rem;
            color: white;
            font-weight: bold;
            margin: 10px 0;
        }

        .timer-info {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 30px;
            border: none;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .modal h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .winner-text {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .score-display {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .play-again-btn {
            background-color: #4169E1;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .play-again-btn:hover {
            background-color: #3155d9;
        }
    </style>
</head>

<body>
    <div class="game-container">
        <div class="player-area">
            <div class="player-name">Player 1</div>
            <div class="score" id="score1">0</div>
            <div class="circle player1" id="circle1">TAP!</div>
        </div>
        <div class="vs-section">
            <div class="vs-text">VS</div>
            <div class="timer-info" id="timer-info">Click any circle to start game</div>
        </div>
        <div class="player-area">
            <div class="player-name">Player 2</div>
            <div class="score" id="score2">0</div>
            <div class="circle player2" id="circle2">TAP!</div>
        </div>
    </div>
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2>Game Over</h2>
            <div class="winner-text" id="winnerText"></div>
            <div class="score-display" id="finalScores"></div>
            <button class="play-again-btn" onclick="playAgain()">Play Again</button>
        </div>
    </div>
    <script>
        let score1 = 0, score2 = 0, gameStarted = false, gameTimer = null, gameEnded = false;
        const score1Element = document.getElementById('score1');
        const score2Element = document.getElementById('score2');
        const circle1Element = document.getElementById('circle1');
        const circle2Element = document.getElementById('circle2');
        const timerInfoElement = document.getElementById('timer-info');
        const modalElement = document.getElementById('gameOverModal');
        const winnerTextElement = document.getElementById('winnerText');
        const finalScoresElement = document.getElementById('finalScores');

        function updateScore(player) {
            if (player === 1) { score1++; score1Element.textContent = score1; }
            else { score2++; score2Element.textContent = score2; }
        }

        function startTimer() {
            if (gameStarted || gameEnded) return;
            gameStarted = true;
            timerInfoElement.textContent = "Game in progress...";
            gameTimer = setTimeout(() => { endGame(); }, 10000);
        }

        function endGame() {
            gameEnded = true;
            let winnerText, finalScoreText;
            if (score1 > score2) {
                winnerText = "Player 1 Wins!";
            } else if (score2 > score1) {
                winnerText = "Player 2 Wins!";
            } else {
                winnerText = "Draw!";
            }
            winnerTextElement.textContent = winnerText;
            finalScoreText = `Player 1: ${score1}  |  Player 2: ${score2}`;
            finalScoresElement.textContent = finalScoreText;
            modalElement.style.display = 'block';
            if (gameTimer) { clearTimeout(gameTimer); gameTimer = null; }
        }

        function playAgain() {
            score1 = 0; score2 = 0; gameStarted = false; gameEnded = false;
            score1Element.textContent = '0'; score2Element.textContent = '0';
            timerInfoElement.textContent = 'Click any circle to start game';
            modalElement.style.display = 'none';
            if (gameTimer) { clearTimeout(gameTimer); gameTimer = null; }
        }

        circle1Element.addEventListener('click', function () {
            if (gameEnded) return;
            if (!gameStarted) startTimer();
            updateScore(1);
        });

        circle2Element.addEventListener('click', function () {
            if (gameEnded) return;
            if (!gameStarted) startTimer();
            updateScore(2);
        });
    </script>
</body>

</html>
